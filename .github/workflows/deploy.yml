name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Cache npm
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm install

      - name: Build 11ty site
        run: npm run build
        env:
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_DATASET: ${{ secrets.SANITY_DATASET }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Push built site to deploy branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: deploy
          publish_dir: ./_site
          commit_message: "Deploy built site"

      - name: Trigger Hostinger Git pull
        run: |
          sleep 10
          if [ -n "$HOSTINGER_WEBHOOK_URL" ]; then
            curl -s -o /dev/null -w "Hostinger webhook status: %{http_code}\n" -X POST "$HOSTINGER_WEBHOOK_URL"
          else
            echo "HOSTINGER_WEBHOOK_URL secret not set — skipping"
          fi
        env:
          HOSTINGER_WEBHOOK_URL: ${{ secrets.HOSTINGER_WEBHOOK_URL }}
