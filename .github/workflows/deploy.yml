name: Deploy to Hostinger

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [sanity-update]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build 11ty site
        run: npm run build
        env:
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_DATASET: ${{ secrets.SANITY_DATASET }}

      - name: Inject API key into chat.php
        run: |
          sed -i "s/__GROQ_API_KEY__/${{ secrets.GROQ_API_KEY }}/" _site/chat.php

      - name: Install deploy tools
        run: sudo apt-get install -y lftp

      - name: Deploy via FTPS
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "
            set ftp:ssl-allow yes;
            set ftp:ssl-force no;
            set ftp:passive-mode yes;
            set ftp:ssl-session-reuse no;
            set ftp:use-feat no;
            set ssl:verify-certificate no;
            set net:timeout 120;
            set net:max-retries 10;
            set net:reconnect-interval-base 3;
            set net:reconnect-interval-multiplier 1;
            set net:idle 0;
            set ftp:socket-buffer-size 0;
            open -u '$FTP_USER','$FTP_PASS' '$FTP_SERVER';
            mirror --reverse --delete --verbose --use-cache --continue \
              --exclude='.git/' \
              ./_site/ /public_html/;
            bye;
          "
