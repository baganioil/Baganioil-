name: Deploy to Hostinger

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [sanity-update]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build 11ty site
        run: npm run build
        env:
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_DATASET: ${{ secrets.SANITY_DATASET }}

      - name: Install deploy tools
        run: sudo apt-get install -y lftp sshpass rsync

      - name: Deploy via SSH/rsync (primary)
        id: ssh_deploy
        continue-on-error: true
        env:
          SSH_PASS: ${{ secrets.FTP_PASSWORD }}
          SSH_USER: ${{ secrets.FTP_USERNAME }}
          SSH_HOST: ${{ secrets.FTP_SERVER }}
        run: |
          sshpass -p "$SSH_PASS" rsync -avz --delete \
            -e "ssh -p 65002 -o StrictHostKeyChecking=no -o ConnectTimeout=30" \
            ./_site/ \
            "$SSH_USER@$SSH_HOST:/public_html/"

      - name: Deploy via FTPS (fallback)
        if: steps.ssh_deploy.outcome == 'failure'
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "
            set ftp:ssl-allow yes;
            set ftp:ssl-force no;
            set ftp:passive-mode yes;
            set ssl:verify-certificate no;
            set net:timeout 60;
            set net:max-retries 5;
            set net:reconnect-interval-base 5;
            open -u '$FTP_USER','$FTP_PASS' '$FTP_SERVER';
            mirror --reverse --delete --verbose --exclude='.git/' ./_site/ /public_html/;
            bye;
          "
