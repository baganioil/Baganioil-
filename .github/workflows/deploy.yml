name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Cache npm
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm install

      - name: Build 11ty site
        run: npm run build
        env:
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_DATASET: ${{ secrets.SANITY_DATASET }}

      - name: Inject API key into chat.php
        run: |
          sed -i "s/__GROQ_API_KEY__/${{ secrets.GROQ_API_KEY }}/" _site/chat.php
          if grep -q '__GROQ_API_KEY__' _site/chat.php; then
            echo "ERROR: GROQ_API_KEY secret is not set or injection failed!"
            exit 1
          fi

      - name: Deploy via SCP to Hostinger
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "_site/."
          target: "/home/${{ secrets.FTP_USERNAME }}/public_html/"
          rm: false
